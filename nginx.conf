events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;

    # Django backend (private)
    upstream django_backend {
        server 127.0.0.1:8000;
    }

    # =================================================
    # CUSTOMER WEBSITE (PORT 80)
    # =================================================

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name 54.169.101.239;

        root /var/www/Flypick-Website/client/Customer_site/dist;
        index index.html index.htm;

        access_log /var/log/nginx/customer_access.log;
        error_log /var/log/nginx/customer_error.log;

        client_max_body_size 50M;
        client_body_timeout 120s;

        # Favicon and manifest files (serve directly, don't route through SPA)
        location /favicon_io/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Django API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering off;
        }

        # Admin panel
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering off;
        }

        # Static files
        location /static/ {
            alias /var/www/Flypick-Website/server/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Media files
        location /media/ {
            alias /var/www/Flypick-Website/storage/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Cache frontend assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Web manifest files
        location ~* \.webmanifest$ {
            add_header Content-Type "application/manifest+json";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA routing (must be last)
        location / {
            try_files $uri $uri/ /index.html;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Block hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # =================================================
    # SELLER DASHBOARD (PORT 8080)
    # =================================================

    server {
        listen 8080;
        listen [::]:8080;
        server_name 54.169.101.239;

        root /var/www/Flypick-Website/client/seller-side/dist;
        index index.html index.htm;

        access_log /var/log/nginx/seller_access.log;
        error_log /var/log/nginx/seller_error.log;

        client_max_body_size 50M;
        client_body_timeout 120s;

        # Django API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering off;
        }

        # Admin panel
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_buffering off;
        }

        # Static files
        location /static/ {
            alias /var/www/Flypick-Website/server/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            alias /var/www/Flypick-Website/storage/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Cache assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Web manifest files
        location ~* \.webmanifest$ {
            add_header Content-Type "application/manifest+json";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA routing (must be last)
        location / {
            try_files $uri $uri/ /index.html;

            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Block hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}