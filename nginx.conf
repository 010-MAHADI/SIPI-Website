events {
    worker_connections 1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    # Cloudflare real IP
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Django backend
    upstream django_backend {
        server 127.0.0.1:8000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name flypick.shop www.flypick.shop seller.flypick.shop;

        return 301 https://$host$request_uri;
    }

    # ==============================
    # CUSTOMER WEBSITE
    # ==============================

    server {
        listen 80;
        server_name flypick.shop www.flypick.shop;

        root /var/www/SIPI-Website/client/Customer_site;
        index index.html;

        # SSL (Let's Encrypt recommended)
        #ssl_certificate /etc/letsencrypt/live/flypick.shop/fullchain.pem;
        #ssl_certificate_key /etc/letsencrypt/live/flypick.shop/privkey.pem;

        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # API requests
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Django admin
        location /admin/ {
            limit_req zone=login burst=5 nodelay;

            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static files
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            alias /var/www/media/;
            expires 1y;
            add_header Cache-Control "public";
        }

        # React / SPA frontend
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ==============================
    # SELLER DASHBOARD
    # ==============================

    server {
        listen 80;
        server_name seller.flypick.shop;

        root /var/www/SIPI-Website/client/seller-side;
        index index.html;

        # ssl_certificate /etc/letsencrypt/live/flypick.shop/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/flypick.shop/privkey.pem;

        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # API requests
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://django_backend;
            proxy_set_header Host flypick.shop;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React SPA
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

}